services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    ports:
      - "8000:8000"
    ipc: host
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/vllm:/root/.cache/vllm
    environment:
      - HF_TOKEN=hf_your_token_here
    command:
      - "--model"
      - "cyankiwi/Qwen3-VL-8B-Instruct-AWQ-4bit"
      - "--dtype"
      - "bfloat16"
      - "--max-model-len"
      - "4096"
      - "--gpu-memory-utilization"
      - "0.95"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 360s
    networks:
      - app-network

  api:
    # Em produção, o CI/CD faz push desta imagem ao ghcr.io e o servidor faz pull.
    # Em desenvolvimento local, rode: docker-compose up --build api
    image: ghcr.io/julioczar1301/boto-lens-api:latest
    build: .
    container_name: fastapi_app
    restart: always
    ports:
      - "8001