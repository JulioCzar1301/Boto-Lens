services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    runtime: nvidia
    ports:
      - "8000:8000"
    ipc: host
    command:
      - "--model"
      - "cyankiwi/Qwen3-VL-8B-Instruct-AWQ-4bit"
      - "--dtype"
      - "half"
      - "--max-model-len"
      - "4096"
      - "--gpu-memory-utilization"
      - "0.95"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]  # ← mudado para /v1/models
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks:
      - app-network          # ← adicionado

  api:
    build: .
    container_name: fastapi_app
    restart: always
    ports:
      - "8001:8001"
    environment:
      - VLLM_URL=http://vllm:8000   # ← nome do serviço, não host.docker.internal
    depends_on:                      # ← adicionado
      vllm:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge