services:
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm-server
    ports:
      - "8000:8000"
    ipc: host
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ~/.cache/vllm:/root/.cache/vllm
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    command:
      - "Qwen/Qwen2.5-VL-7B-Instruct"
      - "--dtype"
      - "bfloat16"
      - "--max-model-len"
      - "8192"
      - "--max-num-seqs"
      - "4"
      - "--gpu-memory-utilization"
      - "0.20"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 900s
    networks:
      - app-network

  api:
    build: .
    container_name: fastapi_app
    restart: always
    ports:
      - "8001:8001"
    environment:
      - VLLM_URL=http://vllm:8000
      - VLLM_MODEL=Qwen/Qwen2.5-VL-7B-Instruct
    depends_on:
      vllm:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
