name: Build, Push & Deploy

# Dispara a cada push (ou merge de PR) na branch main
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/julioczar1301/boto-lens-api

# ------------------------------------------------------------------------------
# JOB 1 - Builda a imagem Docker e faz push ao GitHub Container Registry
# ------------------------------------------------------------------------------
jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados da imagem (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Conecta ao node01 via SSH e aplica o deploy
  # Só roda após o build-and-push concluir com sucesso
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy no node01
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: node01
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
      
          proxy_host: ${{ secrets.SSH_HOST }}
          proxy_username: ${{ secrets.SSH_USER }}
          proxy_key: ${{ secrets.SSH_PRIVATE_KEY }}
          proxy_port: ${{ secrets.SSH_PORT }}
      
          envs: GHCR_TOKEN,GITHUB_ACTOR,DEPLOY_PATH
          script: |
            set -e
      
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
      
            cd "$DEPLOY_PATH"
            git checkout -- .
            git pull origin main

            # 3. Garante que o vllm está rodando (--no-recreate evita reiniciar
            #    se já estiver up, poupando os ~6 min de carregamento do modelo)
            docker compose up -d --no-recreate vllm

            # 4. Baixa e sobe a nova imagem da API sem derrubar o vllm
            docker compose pull api
            docker compose up -d --no-deps api

            # 5. Remove imagens antigas para liberar espaço em disco
            docker image prune -f

            echo "Deploy concluido com sucesso no node01!"
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
