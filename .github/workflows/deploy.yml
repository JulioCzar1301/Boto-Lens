name: Build, Push & Deploy

# Dispara a cada push (ou merge de PR) na branch main
on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/julioczar1301/boto-lens-api

# ──────────────────────────────────────────────────────────────────────────────
# JOB 1 — Builda a imagem Docker e faz push ao GitHub Container Registry
# ──────────────────────────────────────────────────────────────────────────────
jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write   # necessário para escrever no ghcr.io

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # token automático do Actions

      - name: Extrair metadados da imagem (tags e labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # Tag :latest sempre atualizada
            type=raw,value=latest
            # Tag com o SHA do commit para rollback (ex: sha-a1b2c3d)
            type=sha,prefix=sha-

      - name: Configurar Docker Buildx (builds mais rápidos)
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache de layers entre runs para acelerar builds subsequentes
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────────────────────────────
  # JOB 2 — Conecta ao servidor via SSH e aplica o deploy
  # Só roda após o build-and-push concluir com sucesso
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy no Servidor
    runs-on: ubuntu-latest
    needs: build-and-push   # aguarda job 1 terminar

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}       # default: 22 se não configurado
          # Variáveis de ambiente disponíveis no script remoto
          envs: GHCR_TOKEN,GITHUB_ACTOR,DEPLOY_PATH
          script: |
            set -e   # aborta se qualquer comando falhar

            # 1. Autentica no ghcr.io para poder fazer pull da imagem privada
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            # 2. Atualiza o código no servidor (docker-compose.yml etc.)
            cd "$DEPLOY_PATH"
            git pull origin main

            # 3. Baixa a nova imagem da API (leve: só o que mudou nas layers)
            docker compose pull api

            # 4. Sobe o container da API sem derrubar o vllm
            docker compose up -d --no-deps api

            # 5. Remove imagens antigas para liberar espaço em disco
            docker image prune -f

            echo "✅ Deploy concluído com sucesso!"
        env:
          # PAT com escopo read:packages — configure em:
          # GitHub → Settings → Developer settings → Personal access tokens
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          # Caminho absoluto do repositório no servidor (ex: /home/ubuntu/Boto-Lens)
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
